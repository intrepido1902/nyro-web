<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <!-- N mark: two parallel diagonal bars (↗) + right vertical -->
  <!-- Bar 1: left diagonal -->
  <polygon points="2,44 13,44 28,4 17,4" fill="#EEF0FF"/>
  <!-- Bar 2: parallel diagonal (gap between bars creates N negative space) -->
  <polygon points="18,44 29,44 44,4 33,4" fill="#EEF0FF"/>
  <!-- Right vertical element (completes the N) -->
  <rect x="38" y="4" width="10" height="40" rx="0" fill="#EEF0FF"/>

  <!-- NYRO wordmark -->
  <text
    x="62"
    y="34"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="26"
    font-weight="900"
    fill="#EEF0FF"
    letter-spacing="2"
  >NYRO</text>

  <!-- SYSTEMS label -->
  <text
    x="63"
    y="44"
    font-family="'Courier New',Courier,monospace"
    font-size="7"
    fill="#3D4460"
    letter-spacing="3.5"
  >SYSTEMS</text>
</svg>
